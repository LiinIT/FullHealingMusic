<!-- Confirm Delete Modal -->
<div class="modal-overlay" id="modal-confirm-delete">
    <div class="modal" style="max-width: 400px;">
        <div class="modal-title" style="color: #dc3545;">
            <i class="fa-solid fa-triangle-exclamation"></i> Xác Nhận Xoá
        </div>

        <div style="text-align: center; padding: 20px 0;">
            <div style="font-size: 48px; margin-bottom: 16px;">
                <i class="fa-solid fa-trash-can"></i>
            </div>
            <p id="delete-message">Bạn có chắc chắn muốn xoá?</p>
            <p style="font-size: 13px; color: #ff9800;">
                Hành động này không thể hoàn tác!
            </p>
        </div>

        <div class="modal-footer" style="justify-content: center; gap: 12px;">
            <button class="btn btn-danger" onclick="closeModal('modal-confirm-delete')">
                Huỷ
            </button>
            <button class="btn btn-primary" id="btn-confirm-del">
                Xoá Vĩnh Viễn
            </button>
        </div>
    </div>
</div>

<!-- Edit Song Modal -->
<div class="modal-overlay" id="modal-edit-song">
    <div class="modal">
        <div class="modal-title">Chỉnh Sửa Bài Hát</div>

        <div class="form-group">
            <label class="form-label">Tên bài hát *</label>
            <input class="form-input" id="edit-song-title" placeholder="VD: Chạy Ngay Đi">
        </div>

        <div class="form-group">
            <label class="form-label">Nghệ sĩ</label>
            <select class="form-input" id="edit-song-artist-id"></select>
        </div>

        <!-- AUDIO -->
        <div class="form-group">
            <label class="form-label">Audio File</label>

            <input type="file" id="edit-audio-file-input" accept=".mp3,.wav,.flac,.m4a"
                onchange="handleAudioFile('edit', this)" hidden>

            <button class="btn btn-outline" onclick="document.getElementById('edit-audio-file-input').click()">
                Chọn file audio
            </button>

            <span id="edit-audio-filename" style="font-size:12px;color:var(--text-muted);margin-top:6px;display:block">
                Chưa chọn file
            </span>

            <audio id="edit-audio-preview" controls style="display:none"></audio>
        </div>

        <!-- IMAGE -->
        <div class="form-group">
            <label class="form-label">Ảnh bìa</label>
            <center>
                <img id="edit-image-preview" style="
                    display:none;
                    width:100px;
                    height:100px;
                    object-fit:cover;
                    border-radius:888px;">
                <input type="file" id="edit-image-file-input" accept=".jpg,.png,.webp"
                    onchange="handleImageFile('edit', this)" hidden>
                <button class="btn btn-outline" onclick="document.getElementById('edit-image-file-input').click()">
                    Chọn ảnh
                </button>
                <span id="edit-image-filename"
                    style="font-size:12px;color:var(--text-muted);margin-top:6px;display:block">
                    Chưa chọn file
                </span>
            </center>
        </div>

        <div class="form-group">
            <label class="form-label">Duration</label>
            <input class="form-input" id="edit-song-duration" readonly>
        </div>

        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('modal-edit-song')">
                Huỷ
            </button>
            <button class="btn btn-primary" onclick="editSong()">
                Cập nhật
            </button>
        </div>
    </div>
</div>

<!-- Add User Modal -->
<div class="modal-overlay" id="modal-add-user">
    <div class="modal">
        <div class="modal-title">Thêm User</div>
        <!-- IMAGE -->
        <div class="form-group">
            <label class="form-label">Ảnh bìa</label>

                <img id="user-image-preview" style="
                    display:none;
                    width:100px;

                    border-radius:888px;">
                <input type="file" id="user-image-file-input" onchange="handleImageFile('user', this)" hidden>
                <button class="btn btn-outline" style="margin-top: 1em;"
                    onclick="document.getElementById('user-image-file-input').click()">
                    Chọn ảnh
                </button>
                <span id="user-image-filename"
                    style="display: none ;font-size:12px;color:var(--text-muted);margin-top:6px;display:block">

            </center>
        </div>

        <div class="form-group">
            <label class="form-label">Tên*</label>
            <input class="form-input" id="new-user-name" placeholder="VD: Nguyễn Văn A" required>
        </div>
        <div class="form-group">
            <label class="form-label">Tag User*</label>
            <input class="form-input" id="new-user-tag" placeholder="VD: @userA01" required>
        </div>

            <label class="form-label">tài khoản*</label>
            <input class="form-input" id="new-user-acc" required>
